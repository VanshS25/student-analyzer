<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Performance Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0a12; --surface:#13131f; --card:#1a1a2e; --border:#2a2a45; --cyan:#00f5d4; --pink:#ff2d78; --purple:#a855f7; --text:#f0f0ff; --muted:#7070a0; --green:#00e676; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
  body::before { content:''; position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(0,245,212,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,212,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }
  .blob-bg { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.10; animation:drift 12s ease-in-out infinite alternate; }
  .blob1 { width:500px; height:500px; background:var(--cyan); top:-100px; left:-100px; }
  .blob2 { width:400px; height:400px; background:var(--pink); bottom:-100px; right:-100px; animation-delay:-4s; }
  .blob3 { width:300px; height:300px; background:var(--purple); top:40%; left:40%; animation-delay:-8s; }
  @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(40px,30px) scale(1.1)} }
  .wrapper { position:relative; z-index:1; width:100%; max-width:860px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding:20px 24px; background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--cyan); border-radius:12px; }
  .header-left h1 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; color:var(--cyan); }
  .header-left p { font-size:0.72rem; color:var(--muted); margin-top:2px; }
  .status-dot { width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .terminal { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:16px; }
  .terminal-bar { background:#1a1d28; padding:10px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
  .t-dot { width:11px; height:11px; border-radius:50%; }
  .t-dot.r{background:#ff5f57} .t-dot.y{background:#febc2e} .t-dot.g{background:#28c840}
  .terminal-title { margin-left:8px; font-size:0.75rem; color:var(--muted); font-family:'Syne',sans-serif; }
  #output { padding:20px; min-height:360px; max-height:480px; overflow-y:auto; font-size:0.85rem; line-height:1.7; white-space:pre-wrap; word-break:break-word; color:#c8d0e8; }
  #output::-webkit-scrollbar{width:4px} #output::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .input-row { display:flex; align-items:center; border-top:1px solid var(--border); padding:14px 20px; background:#10131a; gap:10px; }
  .prompt { color:var(--cyan); font-size:0.9rem; user-select:none; }
  #userInput { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.9rem; caret-color:var(--cyan); }
  #userInput::placeholder { color:var(--muted); }
  #sendBtn { background:var(--cyan); color:#000; border:none; border-radius:7px; padding:8px 18px; font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem; cursor:pointer; transition:all 0.15s; }
  #sendBtn:hover { background:#00ddb0; transform:translateY(-1px); }
  .quick-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; }
  .quick-title { font-family:'Syne',sans-serif; font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px; }
  .quick-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .qbtn { padding:7px 14px; border-radius:7px; border:1px solid var(--border); background:#1a1d28; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.78rem; cursor:pointer; transition:all 0.15s; }
  .qbtn:hover { border-color:var(--cyan); color:var(--cyan); background:rgba(0,245,212,0.06); }
  .qbtn.danger:hover { border-color:var(--pink); color:var(--pink); }
  #loadingOverlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:20px; }
  .loader-text { font-family:'Syne',sans-serif; font-size:1.1rem; color:var(--cyan); }
  .loader-bar { width:220px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .loader-fill { height:100%; background:var(--cyan); border-radius:2px; animation:load 2.5s ease forwards; }
  @keyframes load { from{width:0} to{width:100%} }
  .loader-sub { font-size:0.75rem; color:var(--muted); }
</style>
</head>
<body>

<div class="blob-bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div id="loadingOverlay">
  <div class="loader-text">🎓 Student Analyzer</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-sub">Loading WebAssembly module...</div>
</div>

<div class="wrapper">
  <header>
    <div class="header-left">
      <h1>⚡ Student Performance Analyzer</h1>
      <p>C → WebAssembly · Running in your browser</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <div class="terminal">
    <div class="terminal-bar">
      <div class="t-dot r"></div><div class="t-dot y"></div><div class="t-dot g"></div>
      <span class="terminal-title">student_analyzer.wasm — live console</span>
    </div>
    <div id="output"></div>
    <div class="input-row">
      <span class="prompt">›</span>
      <input id="userInput" type="text" placeholder="Type here and press Enter..." autocomplete="off" spellcheck="false"/>
      <button id="sendBtn" onclick="sendInput()">Send ↵</button>
    </div>
  </div>

  <div class="quick-panel">
    <div class="quick-title">⚡ Quick buttons</div>
    <div class="quick-grid">
      <button class="qbtn" onclick="quickSend('1')">1 · Add Student</button>
      <button class="qbtn" onclick="quickSend('2')">2 · Display All</button>
      <button class="qbtn" onclick="quickSend('3')">3 · Save</button>
      <button class="qbtn" onclick="quickSend('4')">4 · Search</button>
      <button class="qbtn" onclick="quickSend('5')">5 · Update Marks</button>
      <button class="qbtn" onclick="quickSend('6')">6 · Topper</button>
      <button class="qbtn" onclick="quickSend('7')">7 · Class Stats</button>
      <button class="qbtn" onclick="quickSend('8')">8 · Grade Dist.</button>
      <button class="qbtn danger" onclick="quickSend('0')">0 · Exit</button>
    </div>
  </div>
</div>

<script>
  function appendOutput(text) {
    var el = document.getElementById('output');
    var coloured = text
      .replace(/(\[!\][^\n]*)/g, '<span style="color:#ff2d78">$1</span>')
      .replace(/(\[+\][^\n]*)/g, '<span style="color:#00e676">$1</span>')
      .replace(/(\[i\][^\n]*)/g,  '<span style="color:#7070a0">$1</span>')
      .replace(/(={3,}[^\n]*)/g,  '<span style="color:#00f5d4">$1</span>');
    var span = document.createElement('span');
    span.innerHTML = coloured;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  function sendInput() {
    var val = document.getElementById('userInput').value.trim();
    document.getElementById('userInput').value = '';
    if (val === '') return;
    appendOutput('<span style="color:#00f5d4">› ' + val + '</span>\n');
    // Call the C function directly — no ASYNCIFY needed!
    Module.ccall('processInput', null, ['string'], [val]);
    document.getElementById('userInput').focus();
  }

  function quickSend(val) {
    document.getElementById('userInput').value = val;
    sendInput();
  }

  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendInput();
  });

  var Module = {
    print: function(text) { appendOutput(text + '\n'); },
    printErr: function(text) {
      if (text.indexOf('wasm') === -1 && text.indexOf('fetch') === -1)
        appendOutput('<span style="color:#ff2d78">' + text + '</span>\n');
    },
    onRuntimeInitialized: function() {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('userInput').focus();
    }
  };
</script>

<script src="index.js"></script>
</body>
</html>
